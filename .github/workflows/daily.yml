name: Daily scan

# Runs the full FMCC scan (catalog -> filter -> activity -> leads) on a daily
# cron and on demand. Output is delivered three ways:
#   - the Markdown digest is committed to docs/ (renders on GitHub, linkable);
#   - the visual HTML report + timeline are published to GitHub Pages (shareable
#     link, renders the charts and clickable outlier-trade links);
#   - the full report set is also uploaded as a downloadable artifact.
# NOTE: GitHub Pages must be enabled once at Settings -> Pages -> Source:
# "GitHub Actions" for the publish step to succeed.

on:
  schedule:
    - cron: "0 12 * * *"        # 12:00 UTC daily
  workflow_dispatch:
    inputs:
      window_days:
        description: "Activity history window (days)"
        required: false
        default: "30"
      max_markets:
        description: "Cap markets per platform (blank = no cap)"
        required: false
        default: ""
      include_review:
        description: "Also scan borderline 'review' markets"
        type: boolean
        required: false
        default: false

permissions:
  contents: write          # commit history/events.jsonl + docs/ digest
  pages: write             # publish the visual report to GitHub Pages
  id-token: write          # required by actions/deploy-pages

concurrency:
  group: daily-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run daily scan
        env:
          # Optional — only needed if you hit Kalshi rate/auth limits.
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_API_PRIVATE_KEY: ${{ secrets.KALSHI_API_PRIVATE_KEY }}
          WINDOW_DAYS: ${{ github.event.inputs.window_days || '30' }}
          MAX_MARKETS: ${{ github.event.inputs.max_markets || '' }}
          INCLUDE_REVIEW: ${{ github.event.inputs.include_review || 'false' }}
        run: |
          # NB: -v is a global flag, so it must precede the `daily` subcommand.
          ARGS="--window-days ${WINDOW_DAYS}"
          if [ -n "${MAX_MARKETS}" ]; then ARGS="${ARGS} --max ${MAX_MARKETS}"; fi
          if [ "${INCLUDE_REVIEW}" = "true" ]; then ARGS="${ARGS} --include-review"; fi
          echo "predictionmonitor -v daily ${ARGS}"
          predictionmonitor -v daily ${ARGS}

      - name: Publish digest to job summary
        if: always()
        run: |
          digest="$(ls -t reports/report-*.md 2>/dev/null | head -1)"
          if [ -n "${digest}" ]; then
            cat "${digest}" >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "No digest produced — see the run log." >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Stage published site + committed digest
        if: always()
        run: |
          RUN_DATE="$(date -u +%F)"
          html="$(ls -t reports/report-*.html 2>/dev/null | head -1)"
          md="$(ls -t reports/report-*.md 2>/dev/null | head -1)"
          # GitHub Pages site: latest report as the landing page + dated archive.
          mkdir -p site docs/reports
          if [ -n "${html}" ]; then
            cp "${html}" "site/index.html"
            cp "${html}" "site/report-${RUN_DATE}.html"
          fi
          [ -f reports/timeline.html ] && cp reports/timeline.html site/timeline.html || true
          # Committed Markdown digest: stable latest + dated archive (renders on GitHub).
          if [ -n "${md}" ]; then
            cp "${md}" "docs/latest-report.md"
            cp "${md}" "docs/reports/report-${RUN_DATE}.md"
          fi

      - name: Commit history + digest (default branch)
        # Append-only history + the rendered digest are tracked so they show up
        # on GitHub. Only commit on the default branch to keep features clean.
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add history/events.jsonl docs/latest-report.md docs/reports/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore(reports): daily digest + timeline [skip ci]"
            git push
          fi

      - name: Upload reports artifact (incl. visual HTML + timeline)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ github.run_id }}
          path: |
            reports/*.html
            reports/*.md
            reports/*.json
          if-no-files-found: warn
          retention-days: 90

      - name: Upload GitHub Pages artifact
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  # Publishes the visual report to GitHub Pages. Requires Pages to be enabled
  # once (Settings -> Pages -> Source: "GitHub Actions"); until then this job
  # fails softly without affecting the scan or its committed/uploaded output.
  deploy-pages:
    needs: scan
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    continue-on-error: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
