# FMCC relevance taxonomy.
#
# Defines what makes a prediction market "in scope" for Freddie Mac monitoring.
# Phase 1 only stores this; Phase 2 will score each catalogued market against
# these buckets (keyword/entity match + optional semantic similarity) to build
# the watchlist. Keep terms lowercase; matching is case-insensitive.
#
# `weight` lets some buckets count more toward the relevance score.
# A market that matches multiple buckets is more likely to be FMCC-relevant.

version: 1

buckets:
  housing_and_gse:
    label: "Housing & GSE reform"
    weight: 1.5   # most FMCC-specific category
    description: >
      Housing market conditions, mortgage-rate levels, and the policy/structure
      of the GSEs. (General Fed/monetary-policy markets are intentionally out of
      scope — they are huge and mostly unrelated to Freddie Mac — but mortgage
      rates, which directly drive FMCC's business, stay in.)
    keywords:
      - freddie mac
      - fannie mae
      - gse
      - conservatorship
      - privatize fannie
      - privatize freddie
      - release fannie
      - release freddie
      - gse reform
      - fhfa
      - federal housing finance agency
      - housing market
      - home prices
      - case-shiller
      - housing crash
      - mortgage backed
      - mbs
      - housing starts
      - mortgage rate
      - 30-year mortgage

  fmcc_corporate:
    label: "FMCC corporate events"
    weight: 2.0   # anything naming Freddie Mac itself is high signal
    description: >
      Events tied directly to Freddie Mac / Fannie Mae as entities.
    keywords:
      - freddie mac
      - fmcc
      - fnma
      - fmcc stock
      - fannie mae stock
      - gse ipo
      - gse relisting

# Terms queried directly against each platform's search endpoint so low-volume
# FMCC markets are discovered even when they fall below a volume-capped bulk
# catalog (e.g. Polymarket's Gamma API 422s past a ~2k offset, so paging by
# volume never reaches thin Freddie/Fannie/mortgage markets). Keep these
# specific — generic terms pull noise. If omitted, all bucket keywords are used.
search_terms:
  - freddie mac
  - fannie mae
  - gse
  - conservatorship
  - fhfa
  - federal housing finance agency
  - mortgage rate
  - 30-year mortgage
  - housing market
  - mbs
  - gse reform

# Categories on the platforms that are worth pulling even before keyword match
# (used as a coarse pre-filter hint in Phase 2).
platform_category_hints:
  polymarket:
    - economy
    - economics
    - financials
  kalshi:
    - economics
    - financials
    - climate-and-weather  # excluded example; tune later

# Hard scope exclusions (never flag), to cut obvious noise.
exclude_keywords:
  - sports
  - nba
  - nfl
  - super bowl
